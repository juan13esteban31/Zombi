<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Zomboid Alpha 2.1</title><style>body{margin:0;overflow:hidden;background:#111}canvas{display:block;width:100vw;height:100vh;touch-action:none}</style></head><body><canvas id="g"></canvas><script>
const c=document.getElementById("g"),x=c.getContext("2d");
function r(){c.width=innerWidth;c.height=innerHeight}r();onresize=r;
let p={x:500,y:500,hp:100},j={x:90,y:innerHeight-100,dx:0,dy:0};
let z=[...Array(12)].map(()=>({x:Math.random()*1800,y:Math.random()*1800}));
let tr=[...Array(50)].map(()=>({x:Math.random()*2000,y:Math.random()*2000}));
let hs=[{x:700,y:700,w:140,h:120},{x:1100,y:900,w:160,h:140},{x:850,y:1200,w:120,h:120}];
function t(e){let a=e.touches[0];if(!a)return;let dx=a.clientX-j.x,dy=a.clientY-j.y,d=Math.hypot(dx,dy)||1,m=Math.min(45,d);j.dx=dx/d*m;j.dy=dy/d*m;}
c.addEventListener("touchstart",t);c.addEventListener("touchmove",t);c.addEventListener("touchend",()=>{j.dx=j.dy=0});
(function loop(){requestAnimationFrame(loop);p.x+=j.dx*0.15;p.y+=j.dy*0.15;x.fillStyle="#4b7f3a";x.fillRect(0,0,c.width,c.height);let cx=p.x-c.width/2,cy=p.y-c.height/2;
x.fillStyle="#666";x.fillRect(-cx+900,-cy,180,2000);
hs.forEach(h=>{x.fillStyle="#d8c7a0";x.fillRect(h.x-cx,h.y-cy,h.w,h.h);});
tr.forEach(a=>{x.fillStyle="#2d4";x.beginPath();x.arc(a.x-cx,a.y-cy,18,0,7);x.fill();});
z.forEach(a=>{let dx=p.x-a.x,dy=p.y-a.y,d=Math.hypot(dx,dy)||1;a.x+=dx/d*.35;a.y+=dy/d*.35;x.fillStyle="#b22";x.fillRect(a.x-cx-10,a.y-cy-10,20,20);if(d<22)p.hp-=.03;});
x.fillStyle="#39f";x.fillRect(c.width/2-10,c.height/2-10,20,20);
x.fillStyle="white";x.fillText("HP:"+Math.max(0,p.hp|0),15,25);x.fillText("Alpha 2.1",15,45);
x.globalAlpha=.5;x.beginPath();x.arc(j.x,j.y,50,0,7);x.strokeStyle="white";x.stroke();x.beginPath();x.arc(j.x+j.dx,j.y+j.dy,20,0,7);x.fillStyle="white";x.fill();x.globalAlpha=1;})();</script></body></html>
