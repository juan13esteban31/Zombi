<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Zomboid Mobile Alpha 1</title>
<style>
body{margin:0;overflow:hidden;background:#111}
canvas{display:block;width:100vw;height:100vh;touch-action:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
function resize(){canvas.width=innerWidth;canvas.height=innerHeight} resize(); addEventListener('resize',resize);

let p={x:0,y:0,s:18,hp:100};
let cam={x:0,y:0};
let joy={a:false,bx:90,by:innerHeight-110,x:0,y:0};
let zombies=[];
for(let i=0;i<15;i++) zombies.push({x:Math.random()*2000-1000,y:Math.random()*2000-1000});

function iso(x,y){return {x:(x-y)-cam.x+canvas.width/2,y:(x+y)/2-cam.y+canvas.height/2};}

function touch(e){
 let t=e.touches[0]; if(!t)return;
 let dx=t.clientX-joy.bx, dy=t.clientY-joy.by;
 let d=Math.hypot(dx,dy); let m=Math.min(50,d);
 joy.x=dx/(d||1)*m; joy.y=dy/(d||1)*m; joy.a=true;
}
canvas.addEventListener('touchstart',touch);
canvas.addEventListener('touchmove',touch);
canvas.addEventListener('touchend',()=>{joy.a=false;joy.x=joy.y=0;});

function loop(){
 requestAnimationFrame(loop);
 p.x+=joy.x*0.08; p.y+=joy.y*0.08;
 cam.x=(p.x-p.y); cam.y=(p.x+p.y)/2;

 ctx.clearRect(0,0,canvas.width,canvas.height);

 for(let gx=-20;gx<20;gx++){
  for(let gy=-20;gy<20;gy++){
   let q=iso(gx*64,gy*64);
   ctx.beginPath();
   ctx.moveTo(q.x,q.y-16); ctx.lineTo(q.x+32,q.y);
   ctx.lineTo(q.x,q.y+16); ctx.lineTo(q.x-32,q.y); ctx.closePath();
   ctx.fillStyle=((gx+gy)&1)?"#2d6a2d":"#347a34"; ctx.fill();
  }
 }

 zombies.forEach(z=>{
  let dx=p.x-z.x,dy=p.y-z.y,d=Math.hypot(dx,dy)||1;
  z.x+=dx/d*0.5; z.y+=dy/d*0.5;
  let q=iso(z.x,z.y);
  ctx.fillStyle="#b22222";
  ctx.fillRect(q.x-8,q.y-16,16,16);
  if(d<25) p.hp-=0.03;
 });

 let pp=iso(p.x,p.y);
 ctx.fillStyle="#4da3ff";
 ctx.fillRect(pp.x-8,pp.y-16,16,16);

 ctx.fillStyle="white";
 ctx.font="18px Arial";
 ctx.fillText("HP: "+Math.max(0,p.hp|0),15,25);
 if(p.hp<=0){ctx.fillText("Has muerto",15,50);}

 ctx.globalAlpha=.4;
 ctx.beginPath(); ctx.arc(joy.bx,joy.by,50,0,7); ctx.strokeStyle="white"; ctx.stroke();
 ctx.globalAlpha=.8;
 ctx.beginPath(); ctx.arc(joy.bx+joy.x,joy.by+joy.y,20,0,7); ctx.fillStyle="white"; ctx.fill();
 ctx.globalAlpha=1;
}
loop();
</script>
</body>
</html>
